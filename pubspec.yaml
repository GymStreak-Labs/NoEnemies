name: no_enemies
description: "You've been fighting long enough. A personal peace and conflict resolution journey."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  uuid: ^4.5.1

  # Used by AuthService for Apple Sign-In nonce hashing.
  crypto: ^3.0.6

  # --- Firebase (Phase 1A: auth wired; Firestore + AI wired in later phases) ---
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.2.0
  # Added now, used in Phase 1B / 1C
  cloud_firestore: ^6.3.0
  firebase_ai: ^3.11.0
  firebase_app_check: ^0.4.3
  # Phase 2 — voice journaling MVP. See docs/plans/backend/voice-mentor-research.md
  firebase_storage: ^13.3.0
  record: ^6.2.0
  just_audio: ^0.10.5
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  # Launch hosted Privacy Policy / Terms of Use URLs from paywall + You-tab.
  # Required for App Store Guideline 5.1.1 in-app access to the privacy policy.
  url_launcher: ^6.3.1
  purchases_flutter: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  shaders:
    - shaders/dissolve.frag
  assets:
    - assets/images/intro/
    - assets/images/characters/
    - assets/images/conflicts/
    - assets/images/ui/
    - assets/images/onboarding/
    - assets/images/backgrounds/
    - assets/images/runes/
    - assets/images/voyage/
